# ===============================
# APP CONFIG
# ===============================
spring.application.name=campaignx-agent
server.port=${PORT:8080}

# ===============================
# OPENROUTER LLM CONFIG
# ===============================
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.api.url=${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
openrouter.model=${OPENROUTER_MODEL:meta-llama/llama-3-8b-instruct}

# ===============================
# LOGGING (production friendly)
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.campaignx=DEBUG